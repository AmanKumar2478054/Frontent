<div class="flex flex-col items-center justify-center min-h-screen bg-white p-4 text-center">
  <div class="relative w-32 h-32 mb-8">
    <div class="absolute top-2 right-4 w-12 h-12 border-4 border-gray-800 rounded-full animate-spin-reverse flex items-center justify-center">
      <div class="absolute w-full h-2 bg-gray-800"></div>
      <div class="absolute w-2 h-full bg-gray-800"></div>
      <div class="z-10 w-4 h-4 bg-white rounded-full"></div>
    </div>

    <div class="absolute bottom-4 left-4 w-16 h-16 bg-blue-600 rounded-full animate-spin-slow flex items-center justify-center">
      <div class="absolute w-[115%] h-4 bg-blue-600"></div>
      <div class="absolute w-4 h-[115%] bg-blue-600"></div>
      <div class="z-10 w-6 h-6 bg-white rounded-full shadow-inner"></div>
    </div>
  </div>

  <h1 class="text-2xl font-bold text-gray-700 mb-2">Page not found</h1>
  <p class="text-gray-500 mb-8 max-w-xs mx-auto">
    There may be a technical problem. Refresh to try again.
  </p>

  <button 
    (click)="handleRefresh()"
    class="px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors duration-200 shadow-md">
    Refresh
  </button>
</div>
